<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shoes Try-On Demo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    .shoes-gallery {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .shoe-card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      width: 220px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      transition: transform 0.3s;
    }

    .shoe-card:hover {
      transform: translateY(-5px);
    }

    .shoe-card img {
      width: 100%;
      border-radius: 12px;
    }

    .shoe-card h3 {
      margin-top: 10px;
      font-size: 1rem;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 24px;
      border-radius: 30px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: #007bff;
      color: white;
    }

    .btn-primary:hover {
      background: #0056d2;
    }

    .btn-secondary {
      background: #111;
      color: white;
    }

    .btn-secondary:hover {
      background: #333;
    }

    footer {
      margin-top: 50px;
      font-size: 0.9rem;
      color: #777;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Virtual Shoe Try-On</h1>
    <p>Experience real-time shoe fitting using your camera. Try barefoot or with existing shoes.</p>

    <!-- Shoe Gallery -->
    <div class="shoes-gallery">


      <div class="shoe-card">
        <img src="https://mysticalproductions.github.io/Shoes-TryON/demos/barefoot/assets/shoe1.png" alt="Shoe 2">
        <h3>Nike Dunk Low Retro</h3>
      </div>

      <div class="shoe-card">
        <img src="ttps://mysticalproductions.github.io/Shoes-TryON/demos/barefoot/assets/shoe2.png" alt="Shoe 3">
        <h3>Nike Air Jordan 1 High</h3>
      </div>

    </div>

    <!-- Buttons -->
    <div class="buttons">
      <a href="https://mysticalproductions.github.io/Shoes-TryON/demos/barefoot/index.html"
         class="btn btn-primary" target="_blank">
        Try Shoes (Barefoot)
      </a>

      <a href="https://mysticalproductions.github.io/Shoes-TryON/demos/footVTO/index1"
         class="btn btn-secondary" target="_blank">
        Try Shoes (With Shoes)
      </a>
    </div>

    <footer>
      Powered by Mystical Productions
    </footer>

  </div>

</body>
</html>
