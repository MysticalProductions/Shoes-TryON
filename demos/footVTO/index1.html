<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Shoe Store AR</title>

        <link rel="stylesheet" href="style.css" />

        <style>
            .modeToggle {
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                align-items: center;
                gap: 10px;
                font-weight: 600;
            }

            .switch {
                position: relative;
                display: inline-block;
                width: 52px;
                height: 28px;
            }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

            .slider {
                position: absolute;
                cursor: pointer;
                inset: 0;
                background: #ccc;
                border-radius: 34px;
                transition: 0.3s;
            }

            .slider:before {
                position: absolute;
                content: "";
                height: 22px;
                width: 22px;
                left: 3px;
                bottom: 3px;
                background: white;
                border-radius: 50%;
                transition: 0.3s;
            }

            input:checked + .slider {
                background: #1c3e83;
            }

            input:checked + .slider:before {
                transform: translateX(24px);
            }
        </style>
    </head>

    <body>
        <header>VTO Shoe Store</header>

        <section class="products">
            <div class="card">
                <div class="imgBox">
                    <img src="assets/shoe1.png" />
                </div>
                <h3>Nike Dunk Low Retro</h3>
                <p>₹8,200</p>
                <button onclick="openAR('shoe1.glb')">Try in AR</button>
            </div>

            <div class="card">
                <div class="imgBox">
                    <img src="assets/shoe2.png" />
                </div>
                <h3>Nike Air Jordan 1 High</h3>
                <p>₹25,499</p>
                <button onclick="openAR('shoe2.glb')">Try in AR</button>
            </div>
        </section>

        <div class="modeToggle">
            <span>With Shoes</span>

            <label class="switch">
                <input type="checkbox" id="modeToggle" />
                <span class="slider"></span>
            </label>

            <span>Barefoot</span>
        </div>

        <script>
            function openAR(model) {
                const toggle = document.getElementById("modeToggle");

                if (toggle.checked) {
                    window.location.href = "ar-barefoot.html?model=" + model;
                } else {
                    window.location.href = "ar-foot.html?model=" + model;
                }
            }
        </script>
    </body>
</html>
