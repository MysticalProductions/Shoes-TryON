<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1" />

        <script src="../../dist/WebARRocksHand.js"></script>

        <script src="../../libs/three/v131/build/three.min.js"></script>
        <script src="../../libs/three/v131/examples/js/loaders/GLTFLoader.js"></script>
        <script src="https://unpkg.com/three@0.131.3/examples/js/loaders/DRACOLoader.js"></script>

        <script src="../../helpers/HandTrackerThreeHelper.js"></script>
        <script src="../../helpers/landmarksStabilizers/OneEuroLMStabilizer.js"></script>

        <style>
            body {
                margin: 0;
                background: black;
            }
            canvas {
                position: absolute;
                width: 100%;
                height: 100%;
            }
        </style>
    </head>

    <body>
        <canvas id="handTrackerCanvas"></canvas>
        <canvas id="ARCanvas"></canvas>

        <script>
            const params = new URLSearchParams(location.search);
            const MODEL = params.get("model") || "shoe1.glb";

            HandTrackerThreeHelper.init({
                poseLandmarksLabels: [
                    "ankleBack",
                    "ankleOut",
                    "ankleIn",
                    "ankleFront",
                    "heelBackOut",
                    "heelBackIn",
                    "pinkyToeBaseTop",
                    "middleToeBaseTop",
                    "bigToeBaseTop",
                ],

                NNsPaths: ["../../neuralNets/NN_FOOT_31.json"],

                VTOCanvas: document.getElementById("ARCanvas"),
                handTrackerCanvas: document.getElementById("handTrackerCanvas"),
            }).then(start);

            function start(three) {
                const loader = new THREE.GLTFLoader();

                loader.load("assets/" + MODEL, (gltf) => {
                    HandTrackerThreeHelper.add_threeObject(gltf.scene);
                });
            }
        </script>
    </body>
</html>
